{% set version = "2.12" %}

{% set OSX_VARIANT = os.environ.get("OSX_VARIANT", "native") %}

package:
  name: clblas
  version: "{{ version }}"

source:
  url: https://github.com/clMathLibraries/clBLAS/archive/v{{ version }}.tar.gz
  sha256: 7269c7cb06a43c5e96772010eba032e6d54e72a3abff41f16d765a5e524297a9

build:
  number: 8
  script_env:
    - OSX_VARIANT

{% if OSX_VARIANT != "native" %}
  skip: True  # [not osx]
{% endif %}

  features:
{% if OSX_VARIANT == "pocl" %}
    - osx_pocl_opencl            # [osx]
{% endif %}

requirements:
  build:
    - cmake <4
    - make  # [linux]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - libboost-headers
    - ocl-icd                    # [linux]
    - khronos-opencl-icd-loader  # [win]
{% if OSX_VARIANT == "pocl" %}
    - osx-pocl-opencl            # [osx]
    - pocl >=0.14                # [unix]
{% endif %}

  run:
    - khronos-opencl-icd-loader  # [win]
    - ocl-icd                    # [linux]
{% if OSX_VARIANT == "pocl" %}
    - osx-pocl-opencl            # [osx]
    - pocl >=0.14                # [unix]
{% endif %}

test:
  requires:
    - python {{ environ['PY_VER'] + '*' }}              # [win]

  commands:
    # Check files
    - test -f "${PREFIX}/include/clBLAS.h"           # [unix]
    - test -f "${PREFIX}/lib/libclBLAS.so"           # [linux]
    - test -f "${PREFIX}/lib/libclBLAS.dylib"        # [osx]
    - if not exist %LIBRARY_INC%\\clBLAS.h exit 1    # [win]
    - if not exist %LIBRARY_BIN%\\clBLAS.dll exit 1  # [win]
    - if not exist %LIBRARY_LIB%\\clBLAS.lib exit 1  # [win]

    # Check CLI
    - clBLAS-tune --help

about:
  home: https://github.com/clMathLibraries/clBLAS
  license: Apache-2.0
  license_file: LICENSE
  summary: A software library containing BLAS functions written in OpenCL

extra:
  recipe-maintainers:
    - inducer
    - jakirkham
